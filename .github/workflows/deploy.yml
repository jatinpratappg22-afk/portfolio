name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  # Deploy automatically when you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}        # Your EC2 public IP
          username: ${{ secrets.EC2_USER }}    # Usually "ubuntu" or "ec2-user"
          key: ${{ secrets.EC2_SSH_KEY }}      # Your EC2 private key (.pem file contents)
          script: |
            # Go to app directory
            cd ~/portfolio

            # Pull latest code
            git pull origin main

            # Install dependencies
            npm install --production

            # Restart the app with PM2 (keeps it running)
            pm2 restart portfolio || pm2 start server.js --name portfolio

            echo "✅ Deployed successfully!"
